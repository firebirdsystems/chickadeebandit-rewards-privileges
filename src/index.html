<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rewards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f9fafb);
      --card: var(--hub-surface, #fff);
      --border: var(--hub-border, #e5e7eb);
      --text: var(--hub-text, #111827);
      --muted: var(--hub-text-muted, #6b7280);
      --accent: var(--hub-primary, #111827);
      --accent-light: #f3f4f6;
      --green: #16a34a;
      --green-light: #dcfce7;
      --amber: #d97706;
      --amber-light: #fef3c7;
      --red: #dc2626;
      --radius: var(--hub-radius, .5rem);
      --shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: var(--hub-font-size, 15px); line-height: 1.5; }
    .app { max-width: 720px; margin: 0 auto; padding: 16px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; padding:14px 18px; border-radius:var(--radius); background:var(--accent); color:#fff; }
    h1 { font-size:1.2rem; }
    .sub { font-size:.8rem; opacity:.75; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border:0; border-radius:8px; font-weight:700; font-size:.86rem; cursor:pointer; }
    .btn:disabled { opacity:.5; cursor:default; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ghost { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
    .btn-good { background:var(--green); color:#fff; }
    .btn-danger { background:var(--red); color:#fff; }
    .btn-sm { padding:5px 10px; font-size:.78rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; }
    .card-body { padding:16px 18px; }
    .section-title { font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:9px; }
    .points { display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--accent-light); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
    .points strong { font-size:1.8rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:12px; }
    .reward { padding:14px; }
    .reward-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:8px; }
    .reward h3 { font-size:1rem; }
    .desc { color:var(--muted); font-size:.84rem; min-height:2.4em; }
    .bar { height:8px; border-radius:999px; background:var(--border); overflow:hidden; margin:12px 0 6px; }
    .fill { height:100%; background:var(--green); border-radius:inherit; }
    .meta { display:flex; justify-content:space-between; gap:8px; font-size:.78rem; color:var(--muted); margin-bottom:12px; }
    .request { border-top:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .status { font-size:.74rem; font-weight:800; text-transform:uppercase; border-radius:999px; padding:2px 7px; }
    .status.pending { color:var(--amber); background:var(--amber-light); }
    .status.approved { color:var(--green); background:var(--green-light); }
    .status.rejected { color:var(--red); background:#fee2e2; }
    .empty, .loading { text-align:center; padding:36px 16px; color:var(--muted); }
    .tabs { display:flex; gap:4px; background:var(--border); border-radius:10px; padding:3px; margin-bottom:14px; }
    .tab { flex:1; padding:7px; border:0; border-radius:8px; background:transparent; color:var(--muted); font-weight:800; cursor:pointer; }
    .tab.active { background:#fff; color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .selector { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:8px; margin-bottom:14px; }
    .selector-btn { justify-content:space-between; background:#fff; color:var(--text); border:1.5px solid var(--border); }
    .selector-btn.active { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-light); }
    .notice { border-left:4px solid var(--amber); }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:100; }
    @media (min-width:480px) { .modal-backdrop { align-items:center; padding:20px; } }
    .modal { background:#fff; width:100%; max-width:480px; padding:22px; border-radius:var(--radius) var(--radius) 0 0; }
    @media (min-width:480px) { .modal { border-radius:var(--radius); } }
    .modal h3 { margin-bottom:16px; }
    .form-group { margin-bottom:13px; }
    .form-group label { display:block; font-size:.78rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:9px 11px; font:inherit; }
    .modal-actions { display:flex; gap:8px; margin-top:18px; }
    .modal-actions .btn { flex:1; }
  </style>
  <base href="/run/rewards-privileges/" />
</head>
<body>
<div class="app"><div id="root" class="loading">Loading...</div></div>

<script type="module">
import { esc, isAdult } from "/hub-sdk.js";
import { availablePoints, combineRedemptions, rewardProgress, canRedeem, pendingForReward } from "./logic.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB = window.__DB_URL ?? "";
const EVENTS = window.__EVENTS_URL ?? "/api/events";
const ACTIVITY = window.__ACTIVITY_URL ?? "";
const LOCAL_DEMO = !window.__CURRENT_MEMBER;
let ME = window.__CURRENT_MEMBER ?? { id:"adult-1", name:"Alex", role:"adult" };

let members = [];
let rewards = [];
let redemptionRequests = [];
let redemptionDecisions = [];
let redemptions = [];
let pointsLedger = [];
let selectedKidId = null;
let tab = "rewards";
let modalEl = null;

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ sql, params }) });
  return res.json();
}

async function publishEvent(type, subjectId, payload = {}) {
  await fetch(EVENTS, { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ type, subject_id: subjectId, payload }) }).catch(() => {});
}

async function logActivity(type, description, metadata = {}) {
  if (!ACTIVITY) return;
  await fetch(ACTIVITY, { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ type, description, metadata }) }).catch(() => {});
}

async function loadMembers() {
  if (!CONTEXT) {
    members = [
      { id:"adult-1", name:"Alex", role:"adult" },
      { id:"kid-1", name:"Jordan", role:"child" },
      { id:"kid-2", name:"Casey", role:"child" },
    ];
    return;
  }
  try {
    const res = await fetch(`${CONTEXT}?keys=family.members`);
    members = ((await res.json())["family.members"]) ?? [];
  } catch { members = []; }
}

async function loadData() {
  if (!DB) {
    if (rewards.length === 0) {
      rewards = [
        { id:"demo-movie", title:"Friday movie choice", description:"Pick the family movie this Friday.", cost_points:25, status:"active", created_at:new Date().toISOString() },
        { id:"demo-game", title:"Extra game time", description:"Redeem for 30 minutes of bonus game time.", cost_points:40, status:"active", created_at:new Date().toISOString() },
      ];
    }
    if (pointsLedger.length === 0) {
      pointsLedger = [
        { event_id:"demo-1", member_id:"kid-1", points:10 },
        { event_id:"demo-2", member_id:"kid-1", points:10 },
        { event_id:"demo-3", member_id:"kid-1", points:5 },
        { event_id:"demo-4", member_id:"kid-2", points:15 },
      ];
    }
    hydrateRedemptions();
    return;
  }
  rewards = (await db(`SELECT * FROM app_rewards_privileges__rewards ORDER BY created_at`)).rows ?? [];
  redemptionRequests = (await db(`SELECT * FROM app_rewards_privileges__redemption_requests ORDER BY requested_at DESC`)).rows ?? [];
  redemptionDecisions = (await db(`SELECT * FROM app_rewards_privileges__redemption_decisions ORDER BY decided_at DESC`)).rows ?? [];
  hydrateRedemptions();
  pointsLedger = (await db(`SELECT event_id, member_id, points FROM app_rewards_privileges__points_ledger`)).rows ?? [];
}

function hydrateRedemptions() {
  redemptions = combineRedemptions(rewards, redemptionRequests, redemptionDecisions);
}

function kidList() { return members.filter(m => !isAdult(m)); }
function memberName(id) { return members.find(m => m.id === id)?.name ?? "Someone"; }
function pointsFor(memberId) { return availablePoints(pointsLedger, redemptions, memberId); }
function currentKidId() {
  if (!isAdult(ME)) return ME?.id;
  const kids = kidList();
  if (!selectedKidId || !kids.some(kid => kid.id === selectedKidId)) selectedKidId = kids[0]?.id ?? ME?.id;
  return selectedKidId;
}

async function addReward() {
  if (!isAdult(ME)) return;
  const title = document.getElementById("reward-title").value.trim();
  const description = document.getElementById("reward-description").value.trim();
  const cost = parseInt(document.getElementById("reward-cost").value, 10);
  if (!title || !cost || cost <= 0) return;
  const id = crypto.randomUUID();
  if (!DB) {
    rewards = [...rewards, { id, title, description, cost_points:cost, status:"active", created_by:ME.id, created_at:new Date().toISOString() }];
    closeModal();
    render();
    return;
  }
  await db(
    `INSERT INTO app_rewards_privileges__rewards (id, title, description, cost_points, status, created_by, created_at)
     VALUES (?, ?, ?, ?, 'active', ?, ?)`,
    [id, title, description, cost, ME.id ?? "adult", new Date().toISOString()]
  );
  await publishEvent("reward.available", id, { reward_id:id, title, cost_points:cost });
  await logActivity("reward_available", `New reward available: ${title}`, { rewardId:id });
  closeModal();
  await loadData();
  render();
}

async function requestReward(rewardId) {
  const reward = rewards.find(r => r.id === rewardId && r.status === "active");
  if (!reward || !ME || isAdult(ME)) return;
  if (!canRedeem(pointsFor(ME.id), reward) || pendingForReward(redemptions, ME.id, rewardId)) return;
  if (!DB) {
    redemptionRequests = [{
      id: crypto.randomUUID(),
      reward_id: rewardId,
      member_id: ME.id,
      requested_at: new Date().toISOString(),
    }, ...redemptionRequests];
    hydrateRedemptions();
    render();
    return;
  }
  await db(
    `INSERT INTO app_rewards_privileges__redemption_requests (id, reward_id, member_id, requested_at)
     VALUES (?, ?, ?, ?)`,
    [crypto.randomUUID(), rewardId, ME.id, new Date().toISOString()]
  );
  await loadData();
  render();
}

async function decideRedemption(id, status) {
  if (!isAdult(ME)) return;
  const redemption = redemptions.find(r => r.id === id);
  const reward = rewards.find(r => r.id === redemption?.reward_id);
  if (!redemption || !reward || redemption.status !== "pending" || reward.status !== "active") return;
  if (!DB) {
    redemptionDecisions = [
      ...redemptionDecisions.filter(d => d.request_id !== id),
      {
        id: crypto.randomUUID(),
        request_id: id,
        reward_id: reward.id,
        member_id: redemption.member_id,
        status,
        decided_at: new Date().toISOString(),
        decided_by: ME.id,
      },
    ];
    hydrateRedemptions();
    render();
    return;
  }
  await db(
    `INSERT INTO app_rewards_privileges__redemption_decisions (id, request_id, reward_id, member_id, status, decided_at, decided_by)
     VALUES (?, ?, ?, ?, ?, ?, ?)`,
    [crypto.randomUUID(), id, reward.id, redemption.member_id, status, new Date().toISOString(), ME.id ?? "adult"]
  );
  if (status === "approved") {
    await publishEvent("reward.redeemed", redemption.member_id, {
      reward_id: reward.id,
      title: reward.title,
      member_id: redemption.member_id,
      member_name: memberName(redemption.member_id),
      cost_points: redemption.cost_points,
    });
    await logActivity("reward_redeemed", `${memberName(redemption.member_id)} redeemed ${reward.title}`, {
      memberId: redemption.member_id,
      rewardId: reward.id,
    });
  }
  await loadData();
  render();
}

async function archiveReward(id) {
  if (!isAdult(ME)) return;
  if (!DB) {
    rewards = rewards.map(r => r.id === id ? { ...r, status:"archived" } : r);
    hydrateRedemptions();
    render();
    return;
  }
  await db(`UPDATE app_rewards_privileges__rewards SET status = 'archived' WHERE id = ?`, [id]);
  await loadData();
  render();
}

function openRewardModal() {
  openModal(`
    <h3>Add Reward</h3>
    <div class="form-group"><label>Title</label><input id="reward-title" type="text" placeholder="Friday movie choice" data-autofocus /></div>
    <div class="form-group"><label>Description</label><textarea id="reward-description" rows="3" placeholder="What does the child get?"></textarea></div>
    <div class="form-group"><label>Cost in chore points</label><input id="reward-cost" type="number" min="1" value="25" /></div>
    <div class="modal-actions"><button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-primary" data-action="add-reward">Save</button></div>
  `);
}

function openModal(html) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;
  modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
  modalEl.querySelector("[data-autofocus]")?.focus();
}
function closeModal() { modalEl?.remove(); modalEl = null; }

function renderRewardsFor(memberId) {
  const points = pointsFor(memberId);
  const activeRewards = rewards.filter(reward => reward.status === "active");
  if (activeRewards.length === 0) return `<div class="empty">No rewards yet. An adult can add the first one.</div>`;
  return `<div class="grid">${activeRewards.map(reward => {
    const progress = rewardProgress(points, reward);
    const pending = pendingForReward(redemptions, memberId, reward.id);
    const enough = canRedeem(points, reward);
    return `
      <div class="card reward">
        <div class="reward-top"><h3>${esc(reward.title)}</h3></div>
        <div class="desc">${reward.description ? esc(reward.description) : "No description."}</div>
        <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
        <div class="meta"><span>${points}/${reward.cost_points} points</span><span>${progress}%</span></div>
        ${isAdult(ME)
          ? `<button class="btn btn-ghost btn-sm" data-action="archive-reward" data-reward-id="${esc(reward.id)}">Hide reward</button>`
          : `<button class="btn btn-primary btn-sm" ${!enough || pending ? "disabled" : ""} data-action="request-reward" data-reward-id="${esc(reward.id)}">${pending ? "Requested" : enough ? "Redeem" : "Keep going"}</button>`}
      </div>`;
  }).join("")}</div>`;
}

function renderRequests() {
  const rows = redemptions.filter(r => isAdult(ME) || r.member_id === ME?.id);
  if (rows.length === 0) return `<div class="empty">No redemption requests yet.</div>`;
  return rows.map(r => {
    const reward = rewards.find(x => x.id === r.reward_id) ?? { title:"Hidden reward" };
    const canDecide = isAdult(ME) && r.status === "pending" && r.reward_available;
    return `
      <div class="card request">
        <div>
          <div style="font-weight:800">${esc(memberName(r.member_id))} · ${esc(reward.title)}</div>
          <div style="font-size:.8rem;color:var(--muted)">${r.cost_points} points · ${new Date(r.requested_at).toLocaleDateString()}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="status ${esc(r.status)}">${esc(r.status)}</span>
          ${canDecide ? `
            <button class="btn btn-good btn-sm" data-action="decide-redemption" data-redemption-id="${esc(r.id)}" data-status="approved">Approve</button>
            <button class="btn btn-danger btn-sm" data-action="decide-redemption" data-redemption-id="${esc(r.id)}" data-status="rejected">Reject</button>` : ""}
        </div>
      </div>`;
  }).join("");
}

function renderKidSelector(activeId) {
  if (!isAdult(ME)) return "";
  const kids = kidList();
  if (kids.length <= 1) return "";
  return `<div class="selector">${kids.map(kid => `
    <button class="btn selector-btn ${kid.id === activeId ? "active" : ""}" data-action="select-kid" data-member-id="${esc(kid.id)}">
      <span>${esc(kid.name)}</span><strong>${pointsFor(kid.id)}</strong>
    </button>
  `).join("")}</div>`;
}

function renderDemoSwitcher() {
  if (!LOCAL_DEMO) return "";
  return `<div class="selector">${members.map(member => `
    <button class="btn selector-btn ${member.id === ME?.id ? "active" : ""}" data-action="set-demo-member" data-member-id="${esc(member.id)}">
      <span>${esc(member.name)}</span><span>${isAdult(member) ? "adult" : "kid"}</span>
    </button>
  `).join("")}</div>`;
}

function render() {
  const memberId = currentKidId();
  const kid = members.find(m => m.id === memberId);
  const points = memberId ? pointsFor(memberId) : 0;
  const pendingCount = redemptions.filter(r => r.status === "pending" && (isAdult(ME) || r.member_id === ME?.id)).length;
  document.getElementById("root").innerHTML = `
    <header>
      <div><h1>🎁 Rewards</h1><div class="sub">Visible progress toward things kids care about${LOCAL_DEMO ? " · Demo mode" : ""}</div></div>
      ${isAdult(ME) ? `<button class="btn btn-primary" style="background:#fff;color:var(--accent)" data-action="open-reward-modal">+ Reward</button>` : ""}
    </header>
    ${renderDemoSwitcher()}
    ${renderKidSelector(memberId)}
    ${memberId ? `<div class="points"><div><div class="section-title">${isAdult(ME) ? "Viewing rewards for" : "Working toward"}</div><div style="font-weight:800">${esc(kid?.name ?? "Kid")}</div><div style="font-size:.8rem;color:var(--muted)">${isAdult(ME) ? "Kids redeem points; adults approve requests." : "Redeem when you have enough points. Adults approve requests."}</div></div><strong>${points}</strong><div style="color:var(--muted);font-weight:700">points</div></div>` : ""}
    ${isAdult(ME) && pendingCount > 0 && tab !== "requests" ? `<div class="card notice"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center;gap:12px"><strong>${pendingCount} pending request${pendingCount === 1 ? "" : "s"}</strong><button class="btn btn-primary btn-sm" data-action="set-tab" data-tab="requests">Review</button></div></div>` : ""}
    <div class="tabs">
      <button class="tab ${tab === "rewards" ? "active" : ""}" data-action="set-tab" data-tab="rewards">Rewards</button>
      <button class="tab ${tab === "requests" ? "active" : ""}" data-action="set-tab" data-tab="requests">Requests${pendingCount ? ` (${pendingCount})` : ""}</button>
    </div>
    ${tab === "rewards" && memberId ? renderRewardsFor(memberId) : renderRequests()}
  `;
}

window.openRewardModal = openRewardModal;
window.addReward = addReward;
window.requestReward = requestReward;
window.decideRedemption = decideRedemption;
window.archiveReward = archiveReward;
window.closeModal = closeModal;
window.setTab = next => { tab = next; render(); };
window.selectKid = id => { selectedKidId = id; render(); };
window.setDemoMember = id => {
  if (!LOCAL_DEMO) return;
  const member = members.find(m => m.id === id);
  if (!member) return;
  ME = member;
  if (!isAdult(ME)) selectedKidId = ME.id;
  render();
};

document.addEventListener("click", event => {
  const button = event.target.closest("[data-action]");
  if (!button) return;
  const { action, rewardId, redemptionId, status, memberId, tab: nextTab } = button.dataset;
  if (action === "open-reward-modal") openRewardModal();
  if (action === "add-reward") addReward();
  if (action === "close-modal") closeModal();
  if (action === "archive-reward" && rewardId) archiveReward(rewardId);
  if (action === "request-reward" && rewardId) requestReward(rewardId);
  if (action === "decide-redemption" && redemptionId && status) decideRedemption(redemptionId, status);
  if (action === "select-kid" && memberId) window.selectKid(memberId);
  if (action === "set-demo-member" && memberId) window.setDemoMember(memberId);
  if (action === "set-tab" && nextTab) window.setTab(nextTab);
});

(async () => {
  await loadMembers();
  await loadData();
  render();
})();
</script>
</body>
</html>
